<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connection</title>
    <link rel="stylesheet" href="./login.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jersey+10&family=Kalnia+Glaze:wght@100..700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <h1>Account login</h1>
    <h2>Connect to your account</h2>

    <div class="allContainers">
      <div class="InputContainer">
        <label>username : </label>
        <input type="text" placeholder="Your name here" id="username" />
      </div>

      <div class="InputContainer">
        <label> password : </label>
        <input type="text" placeholder="Your password here" id="password" />
      </div>
      <div id="connect-div">
        <button id="connect-btn">
          CONNECT<img src="../assets/arrow-right.svg" id="arrow-right" />
        </button>
      </div>

      <div>
        <p class="new-text">New to Booba Attack ?</p>
        <a class="create-account-text">Create an account</a>
      </div>
    </div>
    <div class="imgContainer">
      <img src="../assets/melody-wink.svg" class="melody" />
    </div>
  </body>
</html>
