    <h1 id="h1">Step 5</h1>
    <h2 id="h2">Take a photo of your bubble tea</h2>

    <div class="global">
      <img id="image2" alt="" />
      <!--le verre du bubble tea-->

      <img id="strawImage" class="strawImage" />

    <div id="next-div">
